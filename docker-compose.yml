version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: hisab_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hisab
      POSTGRES_USER: hisab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hisab -d hisab"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hisab_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: hisab_backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hisab:${POSTGRES_PASSWORD}@db:5432/hisab
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ENVIRONMENT: development
      COMPANY_NAME: ${COMPANY_NAME}
      COMPANY_GSTIN: ${COMPANY_GSTIN}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
    volumes:
      - ./backend:/app
      - pdf_storage:/app/storage/pdfs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: hisab_frontend
    restart: unless-stopped
    # THE FIX: Map port 8081 directly to the frontend container
    ports:
      - "8081:80"
    environment:
      - VITE_API_URL=/api
    volumes:
      # Mount your custom config to the internal Nginx config path
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  pdf_storage: